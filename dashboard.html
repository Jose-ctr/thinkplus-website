<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ThinkPlus Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="flex bg-gray-100">

  <!-- SIDE MENU -->
  <aside class="w-64 bg-gray-900 text-white h-screen p-4 fixed left-0 top-0">
    <div class="mb-8">
  <h2 class="text-2xl font-bold">ThinkPlus</h2>
  <p class="text-xs text-gray-400">Kilifi Primary</p>
    </div>
    <ul class="space-y-4">
      <li><a href="dashboard.html" class="block p-2 bg-gray-800 rounded">📊 Dashboard</a></li>
<li><a href="students.html" class="block p-2 hover:bg-gray-800 rounded">👨‍🎓 Students</a></li>
<li><a href="fees.html" class="block p-2 hover:bg-gray-800 rounded">💰 Fees</a></li>
<li><a href="#" class="block p-2 hover:bg-gray-800 rounded">👨‍🏫 Teachers</a></li>
<li><a href="#" class="block p-2 hover:bg-gray-800 rounded">📈 Reports</a></li>    </ul>
  </aside>

  <!-- MAIN CONTENT -->
  <main class="flex-1 p-6 ml-64">
    <!-- TOP NAV -->
    <div class="flex justify-between items-center mb-6 bg-white p-4 rounded-xl shadow">
      <h1 class="text-3xl font-bold">Dashboard</h1>
      <div class="text-gray-600">Joseph | Kilifi Primary</div>
    </div>
    
    <!-- 4 CARDS -->
    <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
      <div class="bg-blue-500 text-white p-6 rounded-xl shadow">
        <h3 class="text-sm">Total Students</h3>
        <p class="text-3xl font-bold">523</p>
      </div>
      <div class="bg-green-500 text-white p-6 rounded-xl shadow">
        <h3 class="text-sm">Fees Collected</h3>
        <p class="text-3xl font-bold">KSh 1,250,000</p>
      </div>
      <div class="bg-red-500 text-white p-6 rounded-xl shadow">
        <h3 class="text-sm">Fee Balance</h3>
        <p class="text-3xl font-bold">KSh 480,000</p>
      </div>
      <div class="bg-purple-500 text-white p-6 rounded-xl shadow">
        <h3 class="text-sm">Total Teachers</h3>
        <p class="text-3xl font-bold">28</p>
      </div>
    </div>

    <!-- CHART -->
    <div class="bg-white p-6 rounded-xl shadow">
      <h3 class="font-bold mb-4">Fees Collected Per Month</h3>
      <canvas id="feesChart" height="100"></canvas>
    </div>
  </main>

<script>
new Chart(document.getElementById('feesChart'), {
    type: 'bar',
    data: {
        labels: ['Jan', 'Feb', 'Mar'],
        datasets: [{
            label: 'KSh Collected',
            data: [50000, 80000, 130000],
            backgroundColor: '#10B981'
        }]
    },
    options: { responsive: true }
});

// GET USER ROLE FROM LOGIN
let role = localStorage.getItem("userRole");
let name = localStorage.getItem("userName");

// Redirect to login if no role found
if(!role){
  window.location.href = "index.html";
}

// SIMULATED DATA FOR EACH ROLE
const data = {
  student: {
    total: 523,
    collected: "KSh 45,000",
    balance: "KSh 5,000",
    teachers: 0,
    labels: ["Total Students", "My Fees Collected", "My Fee Balance", "Total Teachers"]
  },
  parent: {
    total: 523,
    collected: "KSh 40,000",
    balance: "KSh 10,000",
    teachers: 0,
    labels: ["Total Students", "Child's Fees Collected", "Child's Fee Balance", "Total Teachers"]
  },
  teacher: {
    total: 45, // number of students in class
    collected: "KSh 0",
    balance: "KSh 0",
    teachers: 1,
    labels: ["My Students", "Class Collected", "Class Balance", "Me"]
  }
};

// UPDATE NUMBERS ON PAGE
if(role && data[role]){
  // Get only the 4 colored cards
let cardNumbers = document.querySelectorAll('.bg-blue-600 .text-3xl,.bg-green-600 .text-3xl,.bg-red-600 .text-3xl,.bg-purple-600 .text-3xl');
let cardTitles = document.querySelectorAll('.bg-blue-600 .text-sm,.bg-green-600 .text-sm,.bg-red-600 .text-sm,.bg-purple-600 .text-sm');
  // Update numbers
  cardNumbers[0].innerText = data[role].total;
  cardNumbers[1].innerText = data[role].collected;
  cardNumbers[2].innerText = data[role].balance;
  cardNumbers[3].innerText = data[role].teachers;

  // Update titles
  cardTitles[0].innerText = data[role].labels[0];
  cardTitles[1].innerText = data[role].labels[1];
  cardTitles[2].innerText = data[role].labels[2];
  cardTitles[3].innerText = data[role].labels[3];

  // Update welcome message
  document.getElementById('welcome').innerText = "Welcome, " + name + "!";
}
  
// SHOW PAY BUTTON FOR STUDENT/PARENT ONLY
if(role == 'student' || role == 'parent'){
  let btn = document.createElement('button');
  btn.innerText = "Pay Fees Now - M-Pesa";
  btn.style.cssText = "padding:15px 30px; background:#0056D6; color:white; border:none; border-radius:8px; font-weight:bold; cursor:pointer; margin-top:20px;";
  btn.onclick = function(){ alert("M-Pesa STK Push will go here"); }
  document.querySelector('main').appendChild(btn);
  }</script>
</body>
</html>
