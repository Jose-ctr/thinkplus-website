<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Students - ThinkPlus</title>

</head>
<body class="flex bg-gray-100">

<!-- Mobile Menu Button -->
<button onclick="document.querySelector('aside').classList.toggle('hidden')" 
class="md:hidden fixed top-4 left-4 z-50 bg-gray-900 text-white p-3 rounded-lg shadow-lg">
  ☰
</button>

<!-- SIDE MENU -->
<aside class="w-64 bg-gray-900 text-white h-screen p-4 fixed hidden md:block">
  <div class="mb-8">
    <h2 class="text-2xl font-bold">ThinkPlus</h2>
    <p class="text-xs text-gray-400">Kilifi Primary</p>
  </div>
  <ul class="space-y-4">
    <li><a href="dashboard.html" class="block p-2 hover:bg-gray-800 rounded">📊 Dashboard</a></li>
    <li><a href="students.html" class="block p-2 bg-gray-800 rounded">👨‍🎓 Students</a></li>
    <li><a href="fees.html" class="block p-2 hover:bg-gray-800 rounded">💰 Fees</a></li>
    <li><a href="#" class="block p-2 hover:bg-gray-800 rounded">👨‍🏫 Teachers</a></li>
  </ul>
</aside>

<!-- MAIN CONTENT -->
<main class="flex-1 p-6 md:ml-64">
    <<div class="flex justify-between items-center mb-4">
  <h1 class="text-3xl font-bold">Students Management</h1>
  <button onclick="addStudent()" class="bg-blue-500 text-white px-4 py-2 rounded-lg">+ Add Student</button>
    </div>

    <!-- STUDENTS TABLE -->
    <div class="bg-white p-6 rounded-xl shadow">
      <table class="w-full">
        <thead>
          <tr class="border-b text-left">
            <th class="p-3">Adm No</th>
            <th class="p-3">Name</th>
            <th class="p-3">Class</th>
            <th class="p-3">Fee Balance</th>
            <th class="p-3">Marks</th>
            <th class="p-3">Action</th>
            <th class="p-3">Action</th>
          </tr>
        </thead>
        <tbody>
          <tr class="border-b">
<tr class="border-b">
  <td class="p-3">001</td>
  <td class="p-3">Amina Juma</td>
  <td class="p-3">Class 8</td>
  <td class="p-3 text-red-500">KSh 5,000</td>
  <td class="p-3">--</td>
  <td class="p-3 flex gap-2">
    <button onclick="editStudent('001','Amina Juma')" class="text-blue-600 hover:underline text-sm">Edit</button>
    <button onclick="addMarks('001','Amina Juma')" class="bg-green-600 text-white px-2 py-1 rounded text-xs">Marks</button>
  </td>
</tr>
<tr class="border-b">
  <td class="p-3">002</td>
  <td class="p-3">John Kamau</td>
  <td class="p-3">Class 7</td>
  <td class="p-3 text-green-500">KSh 0</td>
  <td class="p-3">--</td>
  <td class="p-3 flex gap-2">
    <button onclick="editStudent('002','John Kamau')" class="text-blue-600 hover:underline text-sm">Edit</button>
    <button onclick="addMarks('002','John Kamau')" class="bg-green-600 text-white px-2 py-1 rounded text-xs">Marks</button>
  </td>
</tr>
<tr class="border-b">
  <td class="p-3">003</td>
  <td class="p-3">Faith Achieng</td>
  <td class="p-3">Class 8</td>
  <td class="p-3 text-red-500">KSh 12,000</td>
  <td class="p-3">--</td>
  <td class="p-3 flex gap-2">
    <button onclick="editStudent('003','Faith Achieng')" class="text-blue-600 hover:underline text-sm">Edit</button>
    <button onclick="addMarks('003','Faith Achieng')" class="bg-green-600 text-white px-2 py-1 rounded text-xs">Marks</button>
  </td>
  </tr>
        </tbody>
      </table>
    </div>
  </main>
  <script>
function editStudent(adm, name){ 
  let newName = prompt("Edit Name:", name); 
  if(newName){ alert("✅ Updated: " + newName); } 
}
function addMarks(adm, name){ 
  let sub = prompt("Subject for " + name); 
  let marks = prompt("Marks out of 100:"); 
  if(sub && marks){ alert("✅ Saved: " + name + " - " + sub + " = " + marks); }
}
function addStudent(){ 
  let adm = prompt("Admission No:"); 
  let name = prompt("Student Name:"); 
  if(adm && name){ alert("✅ Added: " + name); location.reload(); }
}
  </script>
</body>
</html>
