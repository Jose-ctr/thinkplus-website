<!DOCTYPE html>
<html>
<head>
  <title>ThinkPlus - Students</title>
  <style>
    body { font-family: Arial; padding: 20px; background: #f5f5f5; }
    .container { max-width: 1000px; margin: auto; background: white; padding: 20px; border-radius: 8px; }
    input { padding: 10px; margin: 5px; width: 200px; border: 1px solid #ccc; border-radius: 4px; }
    button { padding: 10px 15px; background: #4CAF50; color: white; border: none; border-radius: 4px; cursor: pointer; }
    button.delete { background: #f44336; }
    table { width: 100%; border-collapse: collapse; margin-top: 20px; }
    th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
    th { background: #4CAF50; color: white; }
    h1 { color: #333; }
  </style>
</head>
<body>
  <div class="container">
    <h1>ThinkPlus School - Students</h1>

    <h3>Add New Student</h3>
    <input id="studentAdm" placeholder="ADM No" />
    <input id="studentName" placeholder="Full Name" />
    <input id="studentGrade" placeholder="Grade e.g. Form 4" />
    <input id="parentPhone" placeholder="Parent Phone e.g. 0798765432" />
    <button onclick="addStudent()">Add Student</button>

    <table id="studentsTable">
      <thead>
        <tr>
          <th>ADM</th>
          <th>Name</th>
          <th>Grade</th>
          <th>Parent Phone</th>
          <th>Balance</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="studentsBody">
        <tr><td colspan="6">Loading students...</td></tr>
      </tbody>
    </table>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore, collection, addDoc, deleteDoc, doc, onSnapshot, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js"
    from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    // YOUR FIREBASE CONFIG - thinkplus-kilifi
    const firebaseConfig = {
      apiKey: "AIzaSyBBzXfaNbz_l5vXLYu2e5vnC_CN6EC5FN4",
      authDomain: "thinkplus-kilifi.firebaseapp.com",
      projectId: "thinkplus-kilifi",
      storageBucket: "thinkplus-kilifi.firebasestorage.app",
      messagingSenderId: "1067934190834",
      appId: "1:1067934190834:web:e9b5983b9220a3ad7ae146b",
      measurementId: "G-88DV0V8N6Y"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const studentsCol = collection(db, "students");

    window.addStudent = async function() {
      const adm = document.getElementById('studentAdm').value;
      const name = document.getElementById('studentName').value;
      const grade = document.getElementById('studentGrade').value;
      const parentPhone = document.getElementById('parentPhone').value;

      if(!adm || !name || !parentPhone) { alert("ADM, Name and Parent Phone are required"); return; }

      await addDoc(studentsCol, {
        adm, name, grade, parentPhone, balance: 0
      });
      
      document.getElementById('studentAdm').value = '';
      document.getElementById('studentName').value = '';
      document.getElementById('studentGrade').value = '';
      document.getElementById('parentPhone').value = '';
    }

    window.deleteStudent = async function(id) {
      if(confirm("Delete this student?")) {
        await deleteDoc(doc(db, "students", id));
      }
    }

    onSnapshot(studentsCol, (snapshot) => {
      const tbody = document.getElementById('studentsBody');
      tbody.innerHTML = '';
      
      if(snapshot.empty) {
        tbody.innerHTML = '<tr><td colspan="6">No students yet. Add one above.</td></tr>';
        return;
      }

      snapshot.forEach((docSnap) => {
        const student = docSnap.data();
        const id = docSnap.id;
        tbody.innerHTML += `
          <tr>
            <td>${student.adm}</td>
            <td>${student.name}</td>
            <td>${student.grade}</td>
            <td>${student.parentPhone || '-'}</td>
            <td>KSh ${student.balance}</td>
            <td><button class="delete" onclick="deleteStudent('${id}')">Delete</button></td>
          </tr>
        `;
      });
    });
  <script type="module">
  // 1. Firebase setup
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, doc, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
  apiKey: "AIzaSyBBZxfANbz_l5vXLYu2e5vnC",
  authDomain: "thinkplus-kilifi.firebaseapp.com",
  projectId: "thinkplus-kilifi",
  storageBucket: "thinkplus-kilifi.appspot.com",
  messagingSenderId: "1067934190834",
  appId: "1:1067934190834:web:e9b5983b220a3ad7ae146b",
  measurementId: "G-88DV0V8N6Y"
};

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const studentsCol = collection(db, "students");

  // 2. ADD STUDENT - matches your form IDs
  window.addStudent = async () => {
    const adm = document.getElementById('studentAdm').value;
    const name = document.getElementById('studentName').value;
    const grade = document.getElementById('studentGrade').value;
    const parentPhone = document.getElementById('parentPhone').value;

    if(!adm || !name || !grade || !parentPhone) {
      alert("Please fill all fields");
      return;
    }

    await addDoc(studentsCol, {
      adm, name, grade, parentPhone,
      balance: 0,
      createdAt: new Date()
    });

    // Clear form after adding
    document.getElementById('studentAdm').value = "";
    document.getElementById('studentName').value = "";
    document.getElementById('studentGrade').value = "";
    document.getElementById('parentPhone').value = "";
  }

  // 3. SHOW STUDENTS IN TABLE
  onSnapshot(studentsCol, (snapshot) => {
    const tbody = document.querySelector("#studentsTable tbody");
    tbody.innerHTML = ""; // Clear old data
    
    snapshot.forEach(docSnap => {
      const student = docSnap.data();
      const id = docSnap.id;
      
      tbody.innerHTML += `
        <tr>
          <td>${student.adm}</td>
          <td>${student.name}</td>
          <td>${student.grade}</td>
          <td>${student.parentPhone}</td>
          <td>KSh ${student.balance || 0}</td>
          <td>
            <button onclick="payStudent('${id}', ${student.balance || 0})">Pay</button>
            <button onclick="deleteStudent('${id}')">Delete</button>
          </td>
        </tr>
      `;
    });
  });

  // 4. PAY STUDENT - Manual payment
  window.payStudent = async (id, balance) => {
    const amount = prompt(`Enter amount to pay. Balance: KSh ${balance}`);
    if (!amount || isNaN(amount)) return;
    
    alert(`Payment of KSh ${amount} recorded`);
    
    const studentRef = doc(db, "students", id);
    await updateDoc(studentRef, {
      balance: (balance - Number(amount))
    });
  }

  // 5. DELETE STUDENT
  window.deleteStudent = async (id) => {
    if(confirm("Are you sure you want to delete?")) {
      await deleteDoc(doc(db, "students", id));
    }
  }
</script>
</body>
</html>
